name: Update World Cup data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh data
        run: node scripts/update-worldcup-data.mjs
        env:
          WORLD_CUP_DATA_URL: ${{ secrets.WORLD_CUP_DATA_URL }}

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update World Cup data"
          file_pattern: data.json
